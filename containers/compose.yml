version: '3.8'

volumes:
  models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./models

networks:
  llm-network:
    driver: bridge

services:
  # Main orchestrator service
  orchestrator:
    build:
      context: ..
      dockerfile: Podmanfile
    ports:
      - "8011:8011"
    volumes:
      - models:/app/models
    networks:
      - llm-network
    environment:
      - HF_HOME=/app/models
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=0,1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TRANSFORMERS_SERVICE_URL=http://transformers:8012
      - VLLM_SERVICE_URL=http://vllm:8013
      - TENSORRT_SERVICE_URL=http://tensorrt:8014
    device_cgroup_rules:
      - 'c 195:* rmw'  # NVIDIA devices
    depends_on:
      - transformers
      - vllm
      - tensorrt
    profiles:
      - full

  # Transformers microservice
  transformers:
    build:
      context: ..
      dockerfile: microservices/Podmanfile.transformers
    ports:
      - "8012:8012"
    volumes:
      - models:/app/models
    networks:
      - llm-network
    environment:
      - HF_HOME=/app/models
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TRANSFORMERS_SERVICE_PORT=8012
    device_cgroup_rules:
      - 'c 195:* rmw'  # NVIDIA devices
    profiles:
      - full
      - transformers

  # vLLM microservice
  vllm:
    build:
      context: ..
      dockerfile: microservices/Podmanfile.vllm
    ports:
      - "8013:8013"
    volumes:
      - models:/app/models
    networks:
      - llm-network
    environment:
      - HF_HOME=/app/models
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_SERVICE_PORT=8013
    device_cgroup_rules:
      - 'c 195:* rmw'  # NVIDIA devices
    profiles:
      - full
      - vllm

  # TensorRT-LLM microservice
  tensorrt:
    build:
      context: ..
      dockerfile: microservices/Podmanfile.tensorrt
    ports:
      - "8014:8014"
    volumes:
      - models:/app/models
    networks:
      - llm-network
    environment:
      - HF_HOME=/app/models
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=0,1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TENSORRT_SERVICE_PORT=8014
    device_cgroup_rules:
      - 'c 195:* rmw'  # NVIDIA devices
    profiles:
      - full
      - tensorrt