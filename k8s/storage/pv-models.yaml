apiVersion: v1
kind: PersistentVolume
metadata:
  name: llm-models-pv
  labels:
    type: local
    app: llm-tensor-server
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/lib/llm-models
    type: DirectoryOrCreate
