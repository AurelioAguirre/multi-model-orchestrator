apiVersion: v1
kind: Service
metadata:
  name: llm-orchestrator-external
  namespace: llm-inference
  labels:
    app: llm-orchestrator
    service-type: external
spec:
  type: NodePort
  ports:
  - port: 8011
    targetPort: 8011
    nodePort: 30011  # Accessible on Talos node IP:30011
    protocol: TCP
    name: http
  selector:
    app: llm-orchestrator
